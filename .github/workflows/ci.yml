name: CI

on:
  push:
    branches: [ main, master, develop, feature/** ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend (rag-middleware) tests
    runs-on: ubuntu-latest
    if: hashFiles('rag-middleware/**') != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: rag-middleware
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: rag-middleware
        env:
          # Minimal env to run unit tests without external services
          VLLM_BASE_URL: http://localhost:8000/v1
          EMBEDDING_MODEL_DEVICE: cpu
        run: |
          pytest -q --maxfail=1

  lint:
    name: Lint (basic)
    runs-on: ubuntu-latest
    if: hashFiles('rag-middleware/**') != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff
        run: |
          ruff check rag-middleware
