name: SonarQube Local Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Analyze
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available

      - name: Validate SonarQube secrets
        run: |
          if [[ -z "${{ secrets.SONAR_TOKEN || secrets.SONARQUBE_TOKEN }}" ]]; then
            echo "::error title=Missing secret::Set SONAR_TOKEN (or SONARQUBE_TOKEN) in GitHub repository secrets."
            exit 1
          fi
          if [[ -z "${{ secrets.SONAR_HOST_URL }}" ]]; then
            echo "::error title=Missing secret::Set SONAR_HOST_URL in GitHub repository secrets."
            exit 1
          fi

      - name: Validate token against SonarQube API
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          response=$(curl -sS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/authentication/validate" || true)
          echo "Auth validation response: ${response}"
          if [[ "${response}" != *'"valid":true'* ]]; then
            echo "::error title=Invalid Sonar token::Token authentication failed. Regenerate a user token and update SONAR_TOKEN secret."
            exit 1
          fi
          
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.login="${SONAR_TOKEN}" \
            -Dsonar.projectKey=PlantIQ \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/.metrics-venv/**,**/test_keys/**,**/.github/actions-runner/**
