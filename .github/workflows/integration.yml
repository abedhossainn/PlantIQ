name: Integration Tests

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC

jobs:
  integration:
    name: Run integration tests (docker compose)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose v2
        uses: docker/setup-docker@v4
        with:
          compose: true

      - name: Start stack
        run: |
          docker compose up -d

      - name: Wait for services
        run: |
          timeout 180 bash -c "until curl -fsS http://localhost:8001/health/ready; do sleep 2; done"
          timeout 180 bash -c "until curl -fsS http://localhost:8000/v1/models; do sleep 2; done"

      - name: Run integration test script
        run: |
          chmod +x ./scripts/integration/run_integration.sh
          ./scripts/integration/run_integration.sh

      - name: Tear down
        if: always()
        run: docker compose down
