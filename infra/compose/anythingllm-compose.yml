services:
  anything-llm:
    image: mintplexlabs/anythingllm
    container_name: anythingllm
    depends_on:
      - qdrant
    ports:
      - "3001:3001"
    cap_add:
      - SYS_ADMIN
    environment:
      - STORAGE_DIR=/app/server/storage
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://host.docker.internal:11434
      - EMBEDDING_MODEL_PREF=bge-large
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=512
      - OLLAMA_EMBEDDING_BATCH_SIZE=8
      # Point AnythingLLM at Qdrant if you enable Qdrant vector storage
      # (configure inside the AnythingLLM UI or via env depending on your setup).
      # QDRANT_URL=http://qdrant:6333
    volumes:
      - /home/abed/Project/llm-rag-chatbot/Anythingllm/storage:/app/server/storage
    # This allows the container to resolve 'host.docker.internal' 
    # to your machine's IP, making it easy to connect to Ollama.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  docling-serve:
    image: quay.io/docling-project/docling-serve
    container_name: docling-serve
    ports:
      - "5001:5001"
    env_file:
      - docling.env
    environment:
      # HuggingFace cache for Qwen and other models
      - HF_HOME=/opt/app-root/src/.cache/huggingface
    volumes:
      # Persist model cache to avoid re-downloading
      - docling-models:/opt/app-root/src/.cache/docling/models
      # Mount HuggingFace cache (read-write so Docling can download models)
      - /home/abed/.cache/huggingface:/opt/app-root/src/.cache/huggingface
      # Mount custom configuration
      - ./docling-config.py:/opt/app-root/src/docling-config.py:ro
    # GPU disabled - using CPU only to free GPU for Qwen model
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  docling-models:
    driver: local
  qdrant-data:
    driver: local