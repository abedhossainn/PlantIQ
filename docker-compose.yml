# PlantIQ Air-Gapped RAG System
# Unified Docker Compose Orchestration
# Requires: Docker Compose v2 plugin (docker compose), docker.io or docker-ce >= 28

services:
  # ============================================================================
  # Backend API Service (FastAPI + LangChain RAG Middleware)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: plantiq-backend
    runtime: nvidia
    ports:
      - "8001:8000"
    environment:
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - PLANTIQ_REPO_ROOT=/workspace
      - PYTHONPATH=/workspace/apps:/workspace
      - DATABASE_URL=postgresql+asyncpg://plantiq:changeme@postgres:5432/plantiq
      - PIPELINE_PYTHON_PATH=/usr/local/bin/python
      - PIPELINE_SCRIPT_PATH=/workspace/apps/pipeline/src/cli/hitl_pipeline.py
      - PIPELINE_WORK_DIR=/workspace/data/artifacts/hitl_workspace
      - UPLOAD_DIR=/workspace/data/raw
      - ARTIFACTS_DIR=/workspace/data/artifacts
      - DOCLING_URL=http://docling-serve:5001
      - DOCLING_ON_DEMAND=${DOCLING_ON_DEMAND:-true}
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_VISIBLE_DEVICES=${DOCLING_GPU_DEVICE_ID:-1}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DOCLING_ACCELERATOR_DEVICE=${DOCLING_ACCELERATOR_DEVICE:-cuda}
      - QDRANT_HOST=vector-db
      - QDRANT_PORT=6333
      - LLM_HOST=llm
      - LLM_PORT=11434
      - LLM_TIMEOUT=120
      - LLM_BACKEND=ollama
      - TEXT_MODEL_ID=${TEXT_MODEL_ID:-qwen3:4b}
      # Pipeline optimizer model — must be a local path, NOT an Ollama tag.
      # Separate from TEXT_MODEL_ID so chat (Ollama) and pipeline (transformers) can use different models.
      - PIPELINE_TEXT_MODEL_ID=${PIPELINE_TEXT_MODEL_ID:-/workspace/models/Qwen3.5-4B}
      - PIPELINE_CE_EXTRACTION_ENABLED=${PIPELINE_CE_EXTRACTION_ENABLED:-false}
      - PIPELINE_CE_RETRIEVAL_ENABLED=${PIPELINE_CE_RETRIEVAL_ENABLED:-false}
      - LLM_UNLOAD_AFTER_REQUEST=${LLM_UNLOAD_AFTER_REQUEST:-false}
      - LLM_DEMAND_HEARTBEAT_FILE=${LLM_DEMAND_HEARTBEAT_FILE:-/workspace/data/artifacts/runtime/llm_last_used}
      - LLM_STARTUP_WAIT_SECONDS=${LLM_STARTUP_WAIT_SECONDS:-45}
      - LLM_RETRY_INTERVAL_SECONDS=${LLM_RETRY_INTERVAL_SECONDS:-1.0}
      - VLM_HOST=vllm
      - VLM_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SLOW_REQUEST_THRESHOLD_MS=${SLOW_REQUEST_THRESHOLD_MS:-500}
      - LOG_REDACTION_ENABLED=${LOG_REDACTION_ENABLED:-true}
      - SENSITIVE_QUERY_KEYS=${SENSITIVE_QUERY_KEYS:-token,access_token,refresh_token,api_key,key,secret,password,authorization,jwt}
      - QUIET_LOG_PATHS=${QUIET_LOG_PATHS:-/health,/}
      - DETAILED_LOG_PATH_PREFIXES=${DETAILED_LOG_PATH_PREFIXES:-/api/v1/chat,/api/v1/pipeline,/api/docs}
      # --- TUNNEL (reviewer access) — CORS allow-list includes public frontend origin ---
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://10.1.10.181:3000,https://plantiq.sahossain.com,https://plantiqapi.sahossain.com
      # --- DEV (local) — remove the CORS_ALLOW_ORIGINS line above to revert to hardcoded defaults ---
      # --- LDAP — local dev OpenLDAP (set LDAP_MOCK=true to skip real LDAP calls) ---
      - LDAP_SERVER=${LDAP_SERVER:-ldap://ldap:389}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=plantiq,dc=local}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-cn=admin,dc=plantiq,dc=local}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-PlantIQ_Dev_Admin_2026}
      - LDAP_USER_SEARCH_BASE=${LDAP_USER_SEARCH_BASE:-ou=users,dc=plantiq,dc=local}
      - LDAP_MOCK=${LDAP_MOCK:-false}
    volumes:
      - ./:/workspace
      - docling_models:/root/.cache/docling/models
      - ${HOME:-/home/cpdcs}/.cache/huggingface:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock  # on-demand Docling lifecycle control
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '${DOCLING_GPU_DEVICE_ID:-1}'
              capabilities: [gpu]
    command: sh -lc "cd /workspace/apps/api && python -m uvicorn app.main:app --reload --reload-dir /workspace/apps/api/app --reload-dir /workspace/apps/pipeline/src --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      vector-db:
        condition: service_started
      llm:
        condition: service_started
      ldap:
        condition: service_healthy
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # Frontend UI Service (Next.js TypeScript React)
  # ============================================================================
  frontend:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/frontend.Dockerfile
    container_name: plantiq-frontend
    ports:
      - "3000:3000"
    environment:
      # Relative path proxied server-side by Next.js → BACKEND_INTERNAL_URL.
      # Works on localhost:3000 and any Cloudflare tunnel origin without change.
      - NEXT_PUBLIC_API_URL=/PlantIQ/api/backend
      - NEXT_PUBLIC_FASTAPI_URL=/PlantIQ/api/backend
      # Server-side proxy target (Docker internal network, never sent to browser).
      - BACKEND_INTERNAL_URL=http://backend:8000
      # PostgREST: served via Next.js server-side proxy (/PlantIQ/api/postgrest/)
      # so the browser never needs direct access to localhost:3001
      - NEXT_PUBLIC_POSTGREST_URL=/PlantIQ/api/postgrest
      - POSTGREST_INTERNAL_URL=http://plantiq-postgrest:3000
      - NEXT_PUBLIC_DEV_JWT=${NEXT_PUBLIC_DEV_JWT:-eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJzdWIiOiAiMDAwMDAwMDAtMDAwMC0wMDAwLTAwMDAtMDAwMDAwMDAwMDAxIiwgInJvbGUiOiAicGxhbnRpZ19hZG1pbiIsICJhdWQiOiAicGxhbnRpZyIsICJpc3MiOiAicGxhbnRpZy1hdXRoIiwgImV4cCI6IDk5OTk5OTk5OTl9.IJXta4CJER43rcID5iGjjeUIEjdxqqsUhIgWc8_laU0}
      - NEXT_PUBLIC_AUTH_DISABLED=false
      - NEXT_PUBLIC_APP_NAME=PlantIQ
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/components:/app/components
      - ./apps/web/lib:/app/lib
      - ./apps/web/pages:/app/pages
      - ./apps/web/public:/app/public
      - ./apps/web/types:/app/types
      - ./apps/web/package.json:/app/package.json
      - ./apps/web/package-lock.json:/app/package-lock.json
      - ./apps/web/next.config.ts:/app/next.config.ts
      - ./apps/web/postcss.config.mjs:/app/postcss.config.mjs
      - ./apps/web/tsconfig.json:/app/tsconfig.json
      - ./apps/web/next-env.d.ts:/app/next-env.d.ts
      - ./apps/web/components.json:/app/components.json
      - /app/node_modules
      - next_cache:/app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    depends_on:
      - backend
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # Vector Database (Qdrant for semantic search)
  # ============================================================================
  vector-db:
    image: qdrant/qdrant:latest
    container_name: plantiq-vector-db
    ports:
      - "6334:6333"
      - "6335:6334"
    volumes:
      - ./data/indexes/qdrant:/qdrant/storage
    environment:
      - QDRANT_ALLOW_RECOVERY_MODE=true
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # Docling Conversion Service (PDF -> Markdown for ingestion)
  # ============================================================================
  # Pinned to cu128:v1.12.0 (docling 2.72.0 + docling-parse 4.7.3, PyTorch 2.10+cu128).
  #
  # VERSION POLICY — do not change these without end-to-end PDF conversion testing:
  #   - v1.12.0 is the last release line using docling-parse<5.0.0. v1.13.0+
  #     requires docling-parse>=5.3.2 whose StandardPdfPipeline crashes on
  #     null-typed PDF dict objects (confirmed on page 10 of
  #     common_module3_first10.pdf; regression tracked in PROJECT_STATUS.md).
  #   - cu128 variant ships PyTorch compiled for CUDA 12.8 — same torch version
  #     as the CPU image but with full GPU support when NVIDIA Container Toolkit
  #     is installed and the docker daemon has the nvidia runtime configured.
  #
  # GPU PASSTHROUGH — requires host-side NVIDIA Container Toolkit:
  #   Without it the container starts normally and falls back to CPU. With it,
  #   CUDA becomes available and speeds up OCR / table detection.
  #   See PROJECT_STATUS.md "GPU Enablement" for the exact setup commands.
  docling-serve:
    image: quay.io/docling-project/docling-serve-cu128:v1.12.0
    container_name: docling-serve
    profiles:
      - docling
    runtime: nvidia
    ports:
      - "5001:5001"
    environment:
      - HF_HOME=/opt/app-root/src/.cache/huggingface
      # NVIDIA container runtime hooks use these to configure GPU visibility.
      # NVIDIA_VISIBLE_DEVICES controls which host GPUs are exposed to Docling.
      # Default to host GPU 1 (RTX PRO 4000 Blackwell, 24 GB VRAM) because GPU 0
      # is the smaller display-attached RTX A400.
      # NVIDIA_DRIVER_CAPABILITIES declares needed driver subsystems.
      - NVIDIA_VISIBLE_DEVICES=${DOCLING_GPU_DEVICE_ID:-1}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Docling runtime tuning: force the single visible accelerator, limit model
      # fan-out, and use moderate batch sizes that fit comfortably on a 24 GB GPU
      # without driving avoidable CPU churn or duplicate model residency.
      - DOCLING_DEVICE=${DOCLING_DEVICE:-cuda:0}
      - DOCLING_NUM_THREADS=${DOCLING_NUM_THREADS:-4}
      - DOCLING_PERF_PAGE_BATCH_SIZE=${DOCLING_PERF_PAGE_BATCH_SIZE:-8}
      - DOCLING_PERF_ELEMENTS_BATCH_SIZE=${DOCLING_PERF_ELEMENTS_BATCH_SIZE:-16}
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=${DOCLING_SERVE_ENG_LOC_NUM_WORKERS:-1}
      - DOCLING_SERVE_ENG_LOC_SHARE_MODELS=${DOCLING_SERVE_ENG_LOC_SHARE_MODELS:-true}
      - DOCLING_SERVE_OPTIONS_CACHE_SIZE=${DOCLING_SERVE_OPTIONS_CACHE_SIZE:-1}
      - DOCLING_SERVE_OCR_BATCH_SIZE=${DOCLING_SERVE_OCR_BATCH_SIZE:-16}
      - DOCLING_SERVE_LAYOUT_BATCH_SIZE=${DOCLING_SERVE_LAYOUT_BATCH_SIZE:-16}
      - DOCLING_SERVE_TABLE_BATCH_SIZE=${DOCLING_SERVE_TABLE_BATCH_SIZE:-4}
    volumes:
      - docling_models:/opt/app-root/src/.cache/docling/models
      - ${HOME:-/home/cpdcs}/.cache/huggingface:/opt/app-root/src/.cache/huggingface
    # GPU reservation — explicitly bind Docling to one selected host GPU.
    # Default is host GPU 1 (24 GB VRAM). If you need a different GPU, override
    # DOCLING_GPU_DEVICE_ID in the shell or root .env before `make docker-up`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '${DOCLING_GPU_DEVICE_ID:-1}'
              capabilities: [gpu]
    networks:
      - plantiq-network
    # On-demand/no-hold default: do not auto-restart unless explicitly configured.
    restart: ${DOCLING_RESTART_POLICY:-no}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # OpenLDAP — local dev identity store (dc=plantiq,dc=local)
  # Seed users/groups loaded from infra/docker/ldap/seed.ldif.
  # DEV/DEMO ONLY — not for production.
  # ============================================================================
  ldap:
    image: osixia/openldap:1.5.0
    container_name: plantiq-ldap
    ports:
      - "${LDAP_HOST_PORT:-1389}:389"
    environment:
      - LDAP_ORGANISATION=PlantIQ
      - LDAP_DOMAIN=plantiq.local
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD:-PlantIQ_Dev_Admin_2026}
      - LDAP_TLS=false
    command: --copy-service
    volumes:
      - ./infra/docker/ldap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - plantiq-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-D", "cn=admin,dc=plantiq,dc=local", "-w", "PlantIQ_Dev_Admin_2026", "-b", "dc=plantiq,dc=local", "-s", "base"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================================
  # phpLDAPadmin — web GUI for managing the local OpenLDAP server
  # Access: http://localhost:8090  Login DN: cn=admin,dc=plantiq,dc=local
  # DEV/DEMO ONLY — not for production.
  # ============================================================================
  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    container_name: plantiq-ldap-admin
    ports:
      - "${PHPLDAPADMIN_PORT:-8090}:80"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=ldap
      - PHPLDAPADMIN_HTTPS=false
    depends_on:
      ldap:
        condition: service_healthy
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # PostgreSQL Database (User management, review metadata, audit logs)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: plantiq-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-plantiq}
      - POSTGRES_USER=${POSTGRES_USER:-plantiq}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plantiq} -d ${POSTGRES_DB:-plantiq}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # LLM Inference Server for Chat (Ollama/OpenAI-compatible endpoint)
  # ============================================================================
  llm:
    image: ollama/ollama:latest
    container_name: plantiq-llm
    runtime: nvidia
    ports:
      - "${LLM_HOST_PORT:-11435}:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - NVIDIA_VISIBLE_DEVICES=${LLM_GPU_DEVICE_ID:-1}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '${LLM_GPU_DEVICE_ID:-1}'
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - plantiq-network
    restart: unless-stopped

  # ============================================================================
  # vLLM Inference Server (Local LLM for RAG generation)
  # ============================================================================
  # Note: Requires GPU passthrough, configured separately for air-gapped deployment
  # vllm:
  #   build:
  #     context: ./infra/docker
  #     dockerfile: vllm.Dockerfile
  #   container_name: plantiq-vllm
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen2.5-32B-Instruct}
  #     - GPU_MEMORY_UTILIZATION=0.9
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   volumes:
  #     - ~/.cache/huggingface:/root/.cache/huggingface
  #   networks:
  #     - plantiq-network
  #   restart: unless-stopped

  # ============================================================================
  # Nginx Reverse Proxy (Optional: for production deployment)
  # ============================================================================
  # nginx:
  #   build:
  #     context: ./infra/docker
  #     dockerfile: nginx.Dockerfile
  #   container_name: plantiq-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infra/monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - plantiq-network
  #   restart: unless-stopped

  # ============================================================================
  # PostgREST — REST API layer over PostgreSQL
  # Exposes conversations, messages, bookmarks directly to the frontend.
  # ============================================================================
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: plantiq-postgrest
    ports:
      - "${POSTGREST_HOST_PORT:-3001}:3000"
    environment:
      PGRST_DB_URI: postgresql://plantig_authenticator:${POSTGREST_DB_PASSWORD:-CHANGE_ME_IMMEDIATELY}@postgres:5432/plantiq
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: plantig_anon
      PGRST_JWT_SECRET: '{"alg":"RS256","kty":"RSA","use":"sig","n":"kIaNEKKCeyC_W8QrnjoDiRPYC-C_XwAItYxGOFOGGkFNA3bZKVlclunTLNWIaxt_tepK4ajih1NDnMUqId355kPiklSPcd9wYqRK_tE1RXFlWlPgvM79u0Pe-ngonj4O1PXArEeWjrWaQ6tK0amV_-ue85jt37wRWaqzlZx1yLan6v3wrcp07NAd1oebtKCR6NCRVWsiJxxv8c9MjK__iXksK4f8FbD1sd85j00KEhl0CUmAJXLLbj66b-J9I3U95HwOBL1wzCUxKdXbwArh-Nor0D7TxnA1iSNaLBBqhoVWjX3ExkJxDU7-i2QgO8buXqljkz94gCXwj-Cn21qvTw","e":"AQAB","kid":"plantig-2026-v1"}'
      PGRST_JWT_AUD: plantig
      PGRST_SERVER_PORT: 3000
      PGRST_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - plantiq-network
    restart: unless-stopped

networks:
  plantiq-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  docling_models:
    driver: local
  ollama_data:
    driver: local
  next_cache:
    driver: local
  ldap_data:
    driver: local
  ldap_config:
    driver: local
