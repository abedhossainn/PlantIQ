# VLM Configuration for RAG HITL Pipeline
# This is the recommended configuration for production use

# Backend and tuning
backend_type: transformers
# Model identity is loaded from repo-root .env via VISION_MODEL_ID.

# Generation Parameters
max_new_tokens: 2048  # Increased for detailed descriptions
temperature: 0.3      # Lower for more deterministic output
top_p: 0.9
do_sample: true

# Timeout and Performance
timeout: 600          # 10 minutes for safety
image_scale: 1.0
image_resolution: 100  # DPI - balance between quality and GPU memory

# Output Formatting
response_format: markdown
structured_output: true  # Enforce JSON schemas

# GPU Optimization
gpu_memory_fraction: 0.9
dtype: auto  # Let transformers decide (bfloat16 for Qwen)
device_map: auto
trust_remote_code: true
use_fast_tokenizer: false  # Slow tokenizer for better accuracy

# Error Handling
retry_count: 3
retry_delay: 1.0
fallback_on_error: true

# Logging
verbose: true
log_responses: false  # Set to true for debugging

# Custom parameters (optional)
custom_params: {}
